version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - cafemargin_db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/cafemargin.db
      - SECRET_KEY=cafemargin-xolvon-secret-2026
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

volumes:
  cafemargin_db:
